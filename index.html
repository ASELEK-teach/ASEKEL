<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Hub | Sənin Oyun Platforman</title>
    <style>
        body {
            background-color: #1b2838;
            color: white;
            font-family: 'Motiva Sans', Sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #171a21;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-links a {
            color: #dcdedf;
            text-decoration: none;
            margin-right: 20px;
            text-transform: uppercase;
            font-size: 14px;
        }
        .container {
            width: 80%;
            margin: 20px auto;
        }
        .game-card {
            background: linear-gradient(to right, #2a475e, #1b2838);
            border-radius: 5px;
            padding: 20px;
            display: flex;
            gap: 20px;
            border: 1px solid #3d4450;
        }
        .game-image {
            width: 300px;
            height: 170px;
            background-color: #000;
            border-radius: 4px;
            object-fit: cover;
        }
        .game-info h2 {
            margin-top: 0;
            color: #66c0f4;
        }
        .btn-play {
            background-color: #5c7e10;
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 2px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
        .btn-play:hover {
            background-color: #8ed629;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 24px; letter-spacing: 2px;">GAMER HUB</h1>
    <div class="nav-links">
        <a href="#">MAĞAZA</a>
        <a href="#">KİTABXANA</a>
        <a href="#">PROFİL</a>
    </div>
</header>

<div class="container">
    <h2 style="color: #66c0f4;">Mənim İlk Oyunun</h2>
    
    <div class="game-card">
        <!-- Əgər şəkli yükləmisənsə, src="oyun.jpg" hissəsini düzəlt -->
        <img src="yeni%20oyun%20ASEKEL.jpeg" alt="Oyun Şəkli" class="game-image">
        
        <div class="game-info">
            <h2>Oyunun Adı Bura Gələcək</h2>
            <p>Bu Mənim ilk oyunumdur </p>
            <p><strong>Status:</strong> Canlı / Oynamağa Hazır</p>
            <a href="#" class="<button class="play-btn coming-soon">TEZLİKLƏ...</button>">İNDİ OYNA</a>
        </div>
    </div>
</div>

</body>
</html>
